# Sauron Edge — Example Configuration
# ─────────────────────────────────────
# Copy this file to ~/.config/sauron/config.yaml (or wherever
# CONFIGURATION_FILE_PATH points) and edit as needed.
#
# If the file does not exist at startup, the component creates it with
# these exact defaults.

# ─────────────────────────────────────
# Camera
# ─────────────────────────────────────
# 'raspi'    opens /dev/video0 via V4L2 (Raspberry Pi embedded camera).
# 'rtsp'     opens a network stream via FFMPEG; set camera_rtsp_url below.
# 'ntp_loop' plays a local video file in a loop synchronised to NTP wall-clock time.
#            All edge agents playing the same file will always be on the same frame.
#            Works best when video duration divides 60s (e.g. 5s, 10s, 15s, 30s, 60s).
camera_source: raspi

# Required when camera_source is 'rtsp'. Ignored otherwise.
# Example: rtsp://admin:password@192.168.1.100:554/stream1
camera_rtsp_url: ""

# Required when camera_source is 'ntp_loop'. Absolute path to video file.
# Example: /home/pi/test-footage/10s-scene.mp4
camera_ntp_loop_file: ""

# When true, play the ntp_loop video in reverse order.
# All agents with the same setting remain frame-synchronised.
camera_ntp_loop_reverse: false

# Desired capture resolution as "WIDTHxHEIGHT". The actual resolution
# may differ depending on what the device supports.
camera_dimensions: "640x480"

# Horizontal field of view of the lens in degrees.
# This value is embedded in every telemetry message so the server can
# triangulate — measure your lens or use the manufacturer datasheet.
camera_fov: 90.0

# Desired capture frame rate. Higher values increase CPU load.
camera_fps: 24

# ─────────────────────────────────────
# Publishing
# ─────────────────────────────────────
# Number of telemetry messages published per second to IoT Core.
# Each message contains the detections from the most recently processed frame.
publish_rate_hz: 5.0

# Port for the local monitoring dashboard (Flask).
# Access it at http://<device-ip>:5000 from any browser on the same network.
# Set to 0 to disable the dashboard (not recommended — it has near-zero overhead).
dashboard_port: 5000

# ─────────────────────────────────────
# Motion detection (MOG2)
# ─────────────────────────────────────
detection:
  # Background model learning rate. -1 lets OpenCV choose automatically.
  # Values closer to 0 make the model adapt slowly (good for static scenes).
  # Values closer to 1 make it adapt fast (useful if lighting changes often).
  learning_rate: -1.0

  # Minimum foreground blob area in pixels² to be reported as a detection.
  # Increase this if you are getting too many false positives from noise.
  # Decrease it if small/distant objects are being missed.
  min_contour_area: 200.0

  # MOG2 sensitivity threshold. Lower = more sensitive (more false positives).
  # Higher = less sensitive (may miss slow-moving or small objects).
  var_threshold: 16.0

  # Size of the elliptical morphological kernel used for cleanup.
  # Larger values remove more noise but may merge nearby detections.
  morph_kernel_size: 5

  # Fraction of the capture resolution used internally for MOG2 processing.
  # At 0.5 (default), a 640x480 frame is scaled to 320x240 before detection —
  # 4× fewer pixels reduces memory pressure substantially on the Pi.
  # NCoords are normalised so detection accuracy is not affected.
  # Set to 1.0 to process at full resolution (not recommended on Pi 3/4).
  # Note: min_contour_area is automatically scaled by process_scale² internally.
  process_scale: 0.5

  # Minimum consecutive frames a detection must appear in before being published.
  # Noise and lighting transients typically last 1-2 frames; genuine objects persist.
  # Set to 1 to disable stability filtering (publish every raw detection).
  min_stable_frames: 3

  # When true, skip the MQTT publish entirely on frames with no stable detections.
  # Reduces IoT Core message volume when the scene is quiet.
  # Heartbeat messages are lost when enabled — disable if you need constant heartbeats.
  suppress_empty_publishes: false

# ─────────────────────────────────────
# Image upload (S3 snapshots)
# ─────────────────────────────────────
# When enabled, the edge uploads a JPEG snapshot to S3 whenever objects are
# detected and at least min_interval_s seconds have elapsed since the last
# upload.  The S3 key is embedded in the telemetry payload so the server can
# generate pre-signed URLs for the frontend.
#
# IAM credentials come from the Greengrass component's execution role —
# no explicit key/secret required on the device.
image_upload:
  enabled: true
  min_interval_s: 5.0    # upload at most once every 5 seconds
  s3_bucket: "sauron-images"
  s3_prefix: snapshots
  # AWS region of the bucket — REQUIRED if bucket is not in us-east-1.
  # Without this, boto3 defaults to us-east-1 and cross-region requests
  # fail with signature/auth errors.
  s3_region: "ap-south-1"   # set to your bucket's actual region
  jpeg_quality: 75
  # Upload every interval tick even when no objects are detected.
  # Set true so the VLM always has a fresh frame to analyze.
  always_upload: true

# ─────────────────────────────────────
# Hardware sensors
# ─────────────────────────────────────
sensors:
  # UART device path for the GPS module (matches /dev/serial0 on RPi).
  gps_port: /dev/serial0
  gps_baud: 9600

  # Set to false to skip BNO055 IMU initialisation (e.g. if not fitted).
  imu_enabled: true

  # ── Default fallback values ──────────────────────────────────────────
  # These are used as the initial sensor state at startup and whenever the
  # hardware has not yet reported a valid reading. Set to the known fixed
  # position/orientation of the unit if GPS/IMU is unavailable.
  gps_default_lat: 0.0
  gps_default_lon: 0.0
  imu_default_heading: 0.0
  imu_default_pitch: 0.0
  imu_default_roll: 0.0

  # ── Override flags ───────────────────────────────────────────────────
  # When gps_override is true, the override coordinates are ALWAYS published
  # regardless of what the GPS hardware reports. Use this when the GPS is
  # fried but you know the unit's fixed installation position.
  gps_override: false
  gps_override_lat: 0.0
  gps_override_lon: 0.0

  # When imu_override is true, the override orientation is ALWAYS published
  # regardless of what the IMU reports. Use when the IMU is damaged but you
  # know the unit's fixed mounting direction.
  imu_override: false
  imu_override_heading: 0.0
  imu_override_pitch: 0.0
  imu_override_roll: 0.0
