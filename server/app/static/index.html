<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sauron Tracking Dashboard</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #map { width: 100%; height: 100%; background: #000; }
        
        .panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 300px;
            background: rgba(20, 20, 25, 0.9);
            color: #fff;
            border-radius: 8px;
            padding: 15px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 80vh;
            overflow-y: auto;
        }
        .panel h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .track-item { margin-bottom: 10px; font-size: 0.9rem; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 4px; }
        .track-id { font-weight: bold; color: #00ffcc; }
        .track-stats { color: #aaa; margin-top: 5px; }

        /* Custom Leaflet Marker for Objects */
        .object-marker {
            background-color: #00ffcc;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 10px #00ffcc;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    
    <div class="panel">
        <h2>Live Tracks</h2>
        <div id="tracks-container">Waiting for data...</div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="/static/app.js"></script>
</body>
</html>
