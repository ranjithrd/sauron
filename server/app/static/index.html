<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sauron</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
            background: #0d111a;
            color: #e2e5eb;
            overflow: hidden;
        }

        /* Layout */
        #app { display: flex; height: 100vh; }

        #sidebar {
            width: 300px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: #111622;
            border-right: 1px solid rgba(255,255,255,0.07);
            overflow: hidden;
        }

        #map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; background: #0d111a; }

        /* Sidebar header */
        #sidebar-header {
            padding: 16px 16px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }

        #sidebar-header h1 {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: #8892a0;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .stat-row { display: flex; gap: 20px; }

        .stat-badge { display: flex; flex-direction: column; gap: 2px; }

        .stat-badge .label {
            font-size: 0.6rem;
            color: #3a4458;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .stat-badge .value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e2e5eb;
            font-variant-numeric: tabular-nums;
        }

        .stat-badge .value.warn { color: #c9920a; }
        .stat-badge .value.ok   { color: #3fb950; }
        .stat-badge .value.err  { color: #e5534b; }

        /* Sidebar scrollable body */
        #sidebar-body { flex: 1; overflow-y: auto; }
        #sidebar-body::-webkit-scrollbar { width: 3px; }
        #sidebar-body::-webkit-scrollbar-track { background: transparent; }
        #sidebar-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        /* Section headers */
        .section-header {
            position: sticky;
            top: 0;
            background: #111622;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 8px 16px;
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: #3a4458;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header .count { color: #5a6680; font-weight: 400; }

        /* Camera cards */
        .camera-card {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .camera-card:hover { background: rgba(255,255,255,0.02); }

        .camera-id {
            font-size: 0.78rem;
            font-weight: 600;
            color: #e2e5eb;
            margin-bottom: 7px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3fb950;
            flex-shrink: 0;
        }

        .dot.stale { background: #2a3348; }

        .camera-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 12px;
            font-size: 0.7rem;
        }

        .kv { display: flex; gap: 6px; }
        .kv .k { color: #3a4458; width: 50px; flex-shrink: 0; }
        .kv .v { color: #7a8899; font-variant-numeric: tabular-nums; }

        .camera-coords {
            font-size: 0.67rem;
            color: #3a4458;
            margin-top: 6px;
            font-variant-numeric: tabular-nums;
        }

        .camera-lastseen {
            font-size: 0.62rem;
            color: #2a3348;
            margin-top: 2px;
        }

        /* Track cards */
        .track-card {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            cursor: pointer;
        }

        .track-card:hover { background: rgba(255,255,255,0.02); }

        .track-id {
            font-size: 0.75rem;
            font-weight: 600;
            color: #e2e5eb;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .track-pos {
            font-size: 0.72rem;
            color: #7a8899;
            margin-bottom: 3px;
            font-variant-numeric: tabular-nums;
        }

        .track-alt {
            font-size: 0.68rem;
            color: #3a4458;
            margin-bottom: 5px;
            font-variant-numeric: tabular-nums;
        }

        .track-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px 12px;
            font-size: 0.68rem;
        }

        .track-sources {
            font-size: 0.62rem;
            color: #2a3348;
            margin-top: 5px;
        }

        .speed-tag {
            display: inline-block;
            border: 1px solid rgba(63,185,80,0.25);
            border-radius: 2px;
            padding: 1px 6px;
            font-size: 0.65rem;
            font-weight: 500;
            color: #3fb950;
            margin-bottom: 5px;
            font-variant-numeric: tabular-nums;
        }

        .speed-tag.fast {
            border-color: rgba(229,83,75,0.25);
            color: #e5534b;
        }

        /* Footer */
        #sidebar-footer {
            padding: 7px 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.6rem;
            color: #2a3348;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
        }

        .empty-state {
            padding: 24px 16px;
            font-size: 0.72rem;
            color: #2a3348;
            text-align: center;
        }

        /* Map overlays */
        .object-marker {
            background: #e2e5eb;
            border-radius: 50%;
            border: 2px solid #4f7fe4;
        }

        .leaflet-tooltip.ray-tooltip {
            background: #111622;
            border: 1px solid rgba(255,255,255,0.1);
            color: #7a8899;
            font-family: system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
            font-size: 0.68rem;
            padding: 5px 8px;
            border-radius: 3px;
            box-shadow: none;
        }
    </style>
</head>
<body>

<div id="app">

    <!-- ── Sidebar ── -->
    <div id="sidebar">
        <div id="sidebar-header">
            <h1>Sauron</h1>
            <div class="stat-row">
                <div class="stat-badge">
                    <span class="label">Cameras</span>
                    <span class="value ok" id="stat-cameras">—</span>
                </div>
                <div class="stat-badge">
                    <span class="label">Tracks</span>
                    <span class="value" id="stat-tracks">—</span>
                </div>
                <div class="stat-badge">
                    <span class="label">Updated</span>
                    <span class="value" id="stat-updated" style="font-size:0.75rem">—</span>
                </div>
            </div>
        </div>

        <div id="sidebar-body">
            <div class="section-header">
                Cameras
                <span class="count" id="camera-count">0</span>
            </div>
            <div id="cameras-container">
                <div class="empty-state">Loading cameras…</div>
            </div>

            <div class="section-header">
                Live Tracks
                <span class="count" id="track-count">0</span>
            </div>
            <div id="tracks-container">
                <div class="empty-state">Waiting for data…</div>
            </div>
        </div>

        <div id="sidebar-footer">
            <span>poll 500ms</span>
            <span id="footer-time">—</span>
        </div>
    </div>

    <!-- ── Map ── -->
    <div id="map-container">
        <div id="map"></div>
    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="/static/app.js"></script>
</body>
</html>
