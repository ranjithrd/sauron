<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sauron</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
            background: #0d111a;
            color: #e2e5eb;
            overflow: hidden;
        }

        /* Layout */
        #app { display: flex; height: 100vh; }

        #sidebar {
            width: 300px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: #111622;
            border-right: 1px solid rgba(255,255,255,0.07);
            overflow: hidden;
        }

        #map-container { flex: 1; position: relative; min-width: 0; }
        #map { width: 100%; height: 100%; background: #0d111a; }

        /* Discreet map layer toggle (raw triangulation rays) */
        #map-layer-toggle {
            position: absolute;
            left: 10px;
            bottom: 10px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            background: rgba(17,22,34,0.7);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 4px;
            font-size: 0.6rem;
            color: #3a4458;
            opacity: 0.55;
            transition: opacity 0.15s;
        }
        #map-layer-toggle:hover { opacity: 1; }

        /* Right column */
        #right-col {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: #111622;
            border-left: 1px solid rgba(255,255,255,0.07);
            overflow: hidden;
        }

        /* Sidebar header */
        #sidebar-header {
            padding: 14px 16px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        #sidebar-header h1 {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: #8892a0;
            text-transform: uppercase;
        }

        .stat-row { display: flex; gap: 20px; }

        .stat-badge { display: flex; flex-direction: column; gap: 2px; }

        .stat-badge .label {
            font-size: 0.6rem;
            color: #3a4458;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .stat-badge .value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e2e5eb;
            font-variant-numeric: tabular-nums;
        }

        .stat-badge .value.warn { color: #c9920a; }
        .stat-badge .value.ok   { color: #3fb950; }
        .stat-badge .value.err  { color: #e5534b; }

        /* Sidebar scrollable body */
        #sidebar-body { flex: 1; overflow-y: auto; }
        #sidebar-body::-webkit-scrollbar { width: 3px; }
        #sidebar-body::-webkit-scrollbar-track { background: transparent; }
        #sidebar-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        /* Section headers */
        .section-header {
            position: sticky;
            top: 0;
            background: #111622;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 8px 16px;
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: #3a4458;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-header .count { color: #5a6680; font-weight: 400; }

        /* Camera cards */
        .camera-card {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }

        .camera-card:hover { background: rgba(255,255,255,0.02); }

        .camera-id {
            font-size: 0.78rem;
            font-weight: 600;
            color: #e2e5eb;
            margin-bottom: 7px;
            display: flex;
            align-items: center;
            gap: 7px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3fb950;
            flex-shrink: 0;
        }

        .dot.stale { background: #2a3348; }

        .camera-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 12px;
            font-size: 0.7rem;
        }

        .kv { display: flex; gap: 6px; }
        .kv .k { color: #3a4458; width: 50px; flex-shrink: 0; }
        .kv .v { color: #7a8899; font-variant-numeric: tabular-nums; }

        .camera-coords {
            font-size: 0.67rem;
            color: #3a4458;
            margin-top: 6px;
            font-variant-numeric: tabular-nums;
        }

        .camera-lastseen {
            font-size: 0.62rem;
            color: #2a3348;
            margin-top: 2px;
        }

        /* Snapshot image */
        .snapshot-wrap {
            margin-top: 8px;
            border-radius: 4px;
            overflow: hidden;
            background: #0d111a;
            border: 1px solid rgba(255,255,255,0.05);
            display: none;
        }

        .snapshot-wrap.visible { display: block; }

        .snapshot-img {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .snapshot-time {
            font-size: 0.58rem;
            color: #2a3348;
            padding: 3px 6px;
            text-align: right;
        }

        /* Track cards */
        .track-card {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            cursor: pointer;
        }

        .track-card:hover { background: rgba(255,255,255,0.02); }

        .track-id {
            font-size: 0.75rem;
            font-weight: 600;
            color: #e2e5eb;
            margin-bottom: 4px;
            word-break: break-all;
        }

        .track-pos {
            font-size: 0.72rem;
            color: #7a8899;
            margin-bottom: 3px;
            font-variant-numeric: tabular-nums;
        }

        .track-alt {
            font-size: 0.68rem;
            color: #3a4458;
            margin-bottom: 5px;
            font-variant-numeric: tabular-nums;
        }

        .track-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3px 12px;
            font-size: 0.68rem;
        }

        .track-sources {
            font-size: 0.62rem;
            color: #2a3348;
            margin-top: 5px;
        }

        /* Footer */
        #sidebar-footer {
            padding: 7px 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.6rem;
            color: #2a3348;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
        }

        .empty-state {
            padding: 24px 16px;
            font-size: 0.72rem;
            color: #2a3348;
            text-align: center;
        }

        /* Map overlays */
        .object-marker {
            width: 100%;
            height: 100%;
            background: #e2e5eb;
            border-radius: 50%;
            border: 2px solid #4f7fe4;
            transition: transform 0.5s ease-out, box-shadow 0.5s ease-out;
        }

        .leaflet-tooltip.ray-tooltip {
            background: #111622;
            border: 1px solid rgba(255,255,255,0.1);
            color: #7a8899;
            font-family: system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
            font-size: 0.68rem;
            padding: 5px 8px;
            border-radius: 3px;
            box-shadow: none;
        }

        /* ── Right column ─────────────────────────────────── */

        /* Tab bar */
        .tab-bar {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 0;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: #3a4458;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }

        .tab-btn:hover { color: #7a8899; }

        .tab-btn.active {
            color: #e2e5eb;
            border-bottom-color: #4f7fe4;
        }

        .tab-pane { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .tab-pane.active { display: flex; }

        /* VLM tab */
        #vlm-pane {
            overflow-y: auto;
            padding: 12px 14px;
            gap: 10px;
        }

        #vlm-pane::-webkit-scrollbar { width: 3px; }
        #vlm-pane::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        .vlm-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .vlm-label {
            font-size: 0.68rem;
            color: #5a6680;
        }

        .vlm-deadman-badge {
            font-size: 0.58rem;
            color: #3a4458;
            font-variant-numeric: tabular-nums;
        }

        /* Toggle switch */
        .toggle-switch {
            position: relative;
            width: 36px;
            height: 20px;
            cursor: pointer;
        }

        .toggle-switch input { opacity: 0; width: 0; height: 0; }

        .toggle-track {
            position: absolute;
            inset: 0;
            background: #1e2738;
            border-radius: 10px;
            transition: background 0.2s;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #3a4458;
            top: 2px;
            left: 2px;
            transition: transform 0.2s, background 0.2s;
        }

        .toggle-switch input:checked + .toggle-track { background: #1a3a2a; border-color: rgba(63,185,80,0.3); }
        .toggle-switch input:checked + .toggle-track::after { transform: translateX(16px); background: #3fb950; }

        /* VLM inference cards */
        .vlm-card {
            background: #0d111a;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 5px;
            padding: 10px 12px;
            margin-bottom: 8px;
        }

        .vlm-card.is-current {
            border-color: rgba(79,127,228,0.3);
        }

        .vlm-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .vlm-card-badge {
            font-size: 0.58rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 2px 6px;
            border-radius: 3px;
            background: rgba(79,127,228,0.15);
            color: #4f7fe4;
        }

        .vlm-card-badge.past {
            background: rgba(255,255,255,0.04);
            color: #3a4458;
        }

        .vlm-card-time {
            font-size: 0.58rem;
            color: #2a3348;
            font-variant-numeric: tabular-nums;
        }

        .vlm-fields {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .vlm-field {
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }

        .vlm-field-key {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #3a4458;
            width: 52px;
            flex-shrink: 0;
            padding-top: 1px;
        }

        .vlm-field-val {
            font-size: 0.72rem;
            color: #7a8899;
            word-break: break-word;
            flex: 1;
        }

        .vlm-field-val.drone-yes { color: #e5534b; font-weight: 600; }
        .vlm-field-val.drone-no  { color: #3fb950; }

        .vlm-card-error {
            font-size: 0.68rem;
            color: #e5534b;
            word-break: break-word;
        }

        .vlm-card-meta {
            font-size: 0.58rem;
            color: #2a3348;
            margin-top: 6px;
        }

        #vlm-empty {
            font-size: 0.72rem;
            color: #2a3348;
            text-align: center;
            padding: 20px 0;
        }

        /* Message log tab */
        #log-pane {
            overflow-y: auto;
            flex: 1;
        }

        #log-pane::-webkit-scrollbar { width: 3px; }
        #log-pane::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        .msg-row {
            padding: 8px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            cursor: pointer;
        }

        .msg-row:hover { background: rgba(255,255,255,0.02); }

        .msg-row-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .msg-ts {
            font-size: 0.58rem;
            color: #3a4458;
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
        }

        .msg-device {
            font-size: 0.65rem;
            color: #5a6680;
            font-weight: 600;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .msg-topic {
            font-size: 0.58rem;
            color: #2a3348;
            margin-top: 2px;
            word-break: break-all;
        }

        .msg-payload {
            display: none;
            margin-top: 6px;
            background: #0d111a;
            border-radius: 3px;
            padding: 6px 8px;
            font-size: 0.62rem;
            color: #5a6680;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 180px;
            overflow-y: auto;
            font-family: "SF Mono", "Fira Code", monospace;
        }

        .msg-row.expanded .msg-payload { display: block; }

        #log-empty {
            padding: 24px 16px;
            font-size: 0.72rem;
            color: #2a3348;
            text-align: center;
        }

        /* Situation summary */
        #summary-section {
            margin-top: 4px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 10px 0 4px;
        }

        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .summary-title {
            font-size: 0.62rem;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: #3a4458;
        }

#summary-body {
            font-size: 0.72rem;
            color: #7a8899;
            line-height: 1.6;
            word-break: break-word;
        }

        .summary-placeholder { color: #2a3348; font-style: italic; }
        .summary-error { color: #e5534b; }

        #summary-meta {
            font-size: 0.58rem;
            color: #2a3348;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div id="app">

    <!-- ── Left Sidebar ── -->
    <div id="sidebar">
        <div id="sidebar-header">
            <div class="header-top">
                <h1>Sauron</h1>
            </div>
            <div class="stat-row">
                <div class="stat-badge">
                    <span class="label">Cameras</span>
                    <span class="value ok" id="stat-cameras">—</span>
                </div>
                <div class="stat-badge">
                    <span class="label">Tracks</span>
                    <span class="value" id="stat-tracks">—</span>
                </div>
                <div class="stat-badge">
                    <span class="label">Updated</span>
                    <span class="value" id="stat-updated" style="font-size:0.75rem">—</span>
                </div>
            </div>
        </div>

        <div id="sidebar-body">
            <div class="section-header">
                Cameras
                <span class="count" id="camera-count">0</span>
            </div>
            <div id="cameras-container">
                <div class="empty-state">Loading cameras…</div>
            </div>

            <div class="section-header">Live Tracks <span class="count" id="track-count">0</span></div>
            <div id="tracks-container">
                <div class="empty-state">Waiting for data…</div>
            </div>
        </div>

        <div id="sidebar-footer">
            <span>poll 1-2s</span>
            <span id="footer-time">—</span>
        </div>
    </div>

    <!-- ── Map ── -->
    <div id="map-container">
        <div id="map"></div>
        <div id="map-layer-toggle">
            <span>raw rays</span>
            <label class="toggle-switch">
                <input type="checkbox" id="raw-rays-toggle" onchange="onRawRaysToggle(this.checked)">
                <span class="toggle-track"></span>
            </label>
        </div>
    </div>

    <!-- ── Right Column ── -->
    <div id="right-col">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('vlm')">VLM</button>
            <button class="tab-btn" onclick="switchTab('log')">Messages</button>
        </div>

        <!-- VLM Pane -->
        <div class="tab-pane active" id="vlm-pane">
            <div class="vlm-header-row">
                <span class="vlm-label">Auto-analyze snapshots</span>
                <div style="display:flex;align-items:center;gap:8px;">
                    <span class="vlm-deadman-badge" id="vlm-ttl"></span>
                    <label class="toggle-switch">
                        <input type="checkbox" id="vlm-toggle" onchange="onVLMToggle(this.checked)">
                        <span class="toggle-track"></span>
                    </label>
                </div>
            </div>
            <div id="vlm-history"></div>
            <div id="vlm-empty">No analyses yet</div>

            <!-- Situation summary -->
            <div id="summary-section">
                <div class="summary-header">
                    <span class="summary-title">Situation</span>
                </div>
                <div id="summary-body">
                    <span class="summary-placeholder">Generated after each VLM run</span>
                </div>
                <div id="summary-meta"></div>
            </div>
        </div>

        <!-- Message Log Pane -->
        <div class="tab-pane" id="log-pane">
            <div id="log-container">
                <div id="log-empty">Waiting for messages…</div>
            </div>
        </div>
    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="/static/app.js"></script>
</body>
</html>
