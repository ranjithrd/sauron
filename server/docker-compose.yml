services:
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: iotel
      POSTGRES_PASSWORD: iotel
      POSTGRES_DB: iotel
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env
    volumes:
      - ./certs:/app/certs:ro
      - .:/app
    environment:
      DATABASE_URL: postgresql://iotel:iotel@db:5432/iotel

volumes:
  pgdata:
